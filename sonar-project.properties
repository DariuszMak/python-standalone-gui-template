sonar.projectKey=python-standalone-gui-template
sonar.projectName=python-standalone-gui-template
sonar.projectVersion=1.0

sonar.sources=src
sonar.tests=tests

sonar.python.version=3.11

sonar.python.coverage.reportPaths=coverage.xml

sonar.exclusions=\
**/__pycache__/**,\
**/.venv/**,\
**/node_modules/**,\
**/dist/**,\
**/build/**,\
**/htmlcov/**,\
**/ui_*.py

sonar.test.inclusions=tests/**/*

sonar.sourceEncoding=UTF-8